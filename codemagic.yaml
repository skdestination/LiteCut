workflows:
  android-app:
    name: Capacitor Android Build
    max_build_duration: 120
    environment:
      node: latest
      java: 21
    triggering:
      events:
        - push
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web application
        script: npm run build
      - name: Sync Capacitor project
        script: npx cap sync android
      - name: Download OpenCV SDK
        script: |
          cd android
          wget -q https://github.com/opencv/opencv/releases/download/4.9.0/opencv-4.9.0-android-sdk.zip
          unzip -q opencv-4.9.0-android-sdk.zip
          mv OpenCV-android-sdk opencv
      - name: Build Android App
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
